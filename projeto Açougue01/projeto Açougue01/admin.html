<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Painel Admin - Boutique das Carnes Zé das Carnes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(90deg, #b30000, #660000);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1rem;
      opacity: 0.9;
    }

    .content {
      padding: 30px;
    }

    .resumo {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .card-resumo {
      background: #f8f9fa;
      border-left: 5px solid #b30000;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .card-resumo h3 {
      color: #666;
      font-size: 0.9rem;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .card-resumo .numero {
      font-size: 2.5rem;
      font-weight: bold;
      color: #b30000;
    }

    .filtros {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      align-items: center;
    }

    .novo-produto-box {
      display: grid;
      grid-template-columns: 1.2fr 1fr 0.9fr 0.9fr 1.5fr auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 22px;
      padding: 16px;
      background: #f8f9fa;
      border: 1px solid #e6e6e6;
      border-radius: 8px;
    }

    .novo-produto-box .campo {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .novo-produto-box label {
      font-size: 0.85rem;
      color: #555;
      font-weight: 600;
    }

    .novo-produto-box input,
    .novo-produto-box select {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      background: #fff;
    }

    .btn-cadastrar {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #b30000;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      height: 42px;
    }

    .btn-cadastrar:hover {
      background: #8b0000;
    }

    .btn-importar {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #1a6e2e;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      height: 42px;
      margin-top: 10px;
      width: 100%;
    }

    .btn-importar:hover {
      background: #145522;
    }

    .btn-importar:disabled {
      background: #888;
      cursor: not-allowed;
    }

    .filtros input,
    .filtros select {
      padding: 10px 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      flex: 1;
      min-width: 150px;
    }

    .filtros input:focus,
    .filtros select:focus {
      outline: none;
      border-color: #b30000;
      box-shadow: 0 0 5px rgba(179, 0, 0, 0.3);
    }

    .tabela-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }

    thead {
      background: #f8f9fa;
      border-bottom: 2px solid #b30000;
    }

    th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #333;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #eee;
    }

    tbody tr:hover {
      background: #f8f9fa;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .status-disponivel {
      background: #d4edda;
      color: #155724;
    }

    .status-bloqueado {
      background: #f8d7da;
      color: #721c24;
    }

    .estoque-input {
      width: 100px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.95rem;
    }

    .preco-input {
      width: 120px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.95rem;
    }

    .btn-salvar,
    .btn-voltar {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .btn-salvar {
      background: #b30000;
      color: white;
    }

    .btn-salvar:hover {
      background: #8b0000;
    }

    .btn-salvar:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-voltar {
      background: #6c757d;
      color: white;
    }

    .btn-voltar:hover {
      background: #5a6268;
    }

    .numero-estoque {
      font-weight: bold;
      color: #333;
    }

    .numero-zero {
      color: #dc3545;
      font-weight: bold;
    }

    .mensagem {
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .mensagem.sucesso {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .mensagem.erro {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .carregando {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #b30000;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.5rem;
      }

      .novo-produto-box {
        grid-template-columns: 1fr;
      }

      .resumo {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 0.9rem;
      }

      th, td {
        padding: 10px;
      }
    }

    /* ── Login overlay ─────────────────────────────── */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #login-overlay.oculto {
      display: none;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 14px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
    }

    .login-box h2 {
      color: #b30000;
      margin-bottom: 8px;
      font-size: 1.7rem;
    }

    .login-box p {
      color: #666;
      margin-bottom: 24px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .login-box input[type="password"] {
      width: 100%;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 1rem;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    .login-box input[type="password"]:focus {
      outline: none;
      border-color: #b30000;
    }

    .login-erro {
      color: #dc3545;
      font-size: 0.9rem;
      margin-bottom: 12px;
      min-height: 20px;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #b30000;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-login:hover {
      background: #8b0000;
    }

    /* ── Header actions ─────────────────────────────── */
    .header-actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-exportar,
    .btn-sair {
      padding: 9px 22px;
      border: 2px solid rgba(255, 255, 255, 0.7);
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: white;
    }

    .btn-exportar:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .btn-sair {
      border-color: rgba(255, 180, 180, 0.8);
      color: rgba(255, 200, 200, 1);
    }

    .btn-sair:hover {
      background: rgba(220, 53, 69, 0.3);
    }
  </style>
</head>
<body>
  <!-- Login Overlay -->
  <div id="login-overlay">
    <div class="login-box">
      <h2>🔐 Acesso Restrito</h2>
      <p>Painel Administrativo<br>Boutique das Carnes e Conveniência Zé das Carnes</p>
      <input type="password" id="login-senha" placeholder="Digite a senha de administrador"
        onkeydown="if(event.key==='Enter')fazerLogin()">
      <div class="login-erro" id="login-erro"></div>
      <button class="btn-login" onclick="fazerLogin()">Entrar</button>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <h1>📦 Painel Administrativo</h1>
      <p>Boutique das Carnes e Conveniência Zé das Carnes - Gerenciamento de Estoque</p>
      <div class="header-actions">
        <button class="btn-exportar" onclick="exportarDados('csv')">⬇ Exportar CSV</button>
        <button class="btn-exportar" onclick="exportarDados('xlsx')">⬇ Exportar Excel</button>
        <button class="btn-exportar" style="background:rgba(255,200,0,0.15); border-color:rgba(255,220,80,0.8); color:#ffe066;" onclick="exportarPedidosDia()">📅 Pedidos do Dia</button>
        <button class="btn-sair" onclick="fazerLogout()">🚪 Sair</button>
      </div>
    </div>

    <div class="content">
      <div id="mensagem" class="mensagem"></div>

      <div class="resumo">
        <div class="card-resumo">
          <h3>Total de Produtos</h3>
          <div class="numero" id="total-produtos">0</div>
        </div>
        <div class="card-resumo">
          <h3>Produtos com Estoque</h3>
          <div class="numero" id="com-estoque">0</div>
        </div>
        <div class="card-resumo">
          <h3>Sem Estoque (<span id="sem-estoque">0</span>)</h3>
          <div style="font-size: 0.9rem; color: #dc3545;">⚠️ Bloqueados</div>
        </div>
      </div>

      <div class="filtros">
        <input type="text" id="filtro-nome" placeholder="🔍 Procurar por nome do produto...">
        <select id="filtro-categoria">
          <option value="">Todas as Categorias</option>
          <option value="bovino">Bovino</option>
          <option value="suino">Suíno</option>
          <option value="frango">Frango</option>
          <option value="rotisseria">Rotisseria</option>
          <option value="conveniencia">Conveniencia</option>
        </select>
        <button class="btn-voltar" onclick="location.href='/'">← Voltar para Loja</button>
      </div>

      <div class="novo-produto-box">
        <div class="campo">
          <label for="novo-nome">Nome do novo produto</label>
          <input type="text" id="novo-nome" placeholder="Ex.: Linguiça Toscana">
        </div>
        <div class="campo">
          <label for="novo-categoria">Categoria</label>
          <select id="novo-categoria">
            <option value="bovino">Bovino</option>
            <option value="suino">Suíno</option>
            <option value="frango">Frango</option>
            <option value="rotisseria">Rotisseria</option>
            <option value="conveniencia">Conveniencia</option>
          </select>
        </div>
        <div class="campo">
          <label for="novo-preco">Preço (R$)</label>
          <input type="number" id="novo-preco" step="0.01" min="0.01" placeholder="0,00">
        </div>
        <div class="campo">
          <label for="novo-estoque">Estoque inicial (kg)</label>
          <input type="number" id="novo-estoque" step="0.1" min="0" placeholder="0,0">
        </div>
        <div class="campo">
          <label for="novo-imagem-url">Imagem (URL/caminho)</label>
          <input type="text" id="novo-imagem-url" placeholder="imagens_projeto_acougue/Carne_Primeira/minha-imagem.jpg">
        </div>
        <button class="btn-cadastrar" id="btn-cadastrar-produto">+ Cadastrar</button>
        <button class="btn-importar" id="btn-importar-catalogo">⬇ Importar Catálogo Padrão (todos os produtos / estoque zerado)</button>
      </div>

      <div class="tabela-wrapper" id="tabela-container">
        <div class="carregando">
          <div class="spinner"></div>
          <p>Carregando dados...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Carregamento de configuração centralizada -->
  <script src="config.js?v=20260408-2"></script>
  
  <script>
    // ── Autenticação ─────────────────────────────────────────────────────
    const getToken = () => localStorage.getItem('adminToken') || ''; 

    const mostrarLoginOverlay = () => {
      document.getElementById('login-overlay').classList.remove('oculto');
      setTimeout(() => { const s = document.getElementById('login-senha'); if (s) s.focus(); }, 50);
    };

    const fetchAdmin = async (url, options = {}) => {
      const res = await fetch(url, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          ...(options.headers || {}),
          'Authorization': `Bearer ${getToken()}`
        }
      });
      if (res.status === 401) {
        localStorage.removeItem('adminToken');
        mostrarLoginOverlay();
        throw new Error('Sessão expirada. Faça login novamente.');
      }
      return res;
    };

    const fazerLogin = async () => {
      const senhaInput = document.getElementById('login-senha');
      const erroEl = document.getElementById('login-erro');
      const senha = senhaInput.value;
      if (!senha) { erroEl.textContent = 'Digite a senha.'; return; }
      erroEl.textContent = '';
      try {
        if (!API_BASE_URL) {
          throw new Error('API não configurada. Defina a URL do backend em config.js e publique novamente.');
        }

        const res = await fetch(`${API_BASE_URL}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ senha })
        });
        if (!res.ok) {
          if (res.status === 404) {
            throw new Error('API não encontrada. Verifique a URL do backend em config.js.');
          }
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Senha incorreta');
        }
        const { token } = await res.json();
        localStorage.setItem('adminToken', token);
        document.getElementById('login-overlay').classList.add('oculto');
        senhaInput.value = '';
        carregarDados();
      } catch (err) {
          erroEl.textContent = '❌ ' + getMensagemErro(err, 'Falha ao autenticar');
      }
    };

    const fazerLogout = () => {
      localStorage.removeItem('adminToken');
      mostrarLoginOverlay();
    };

    const exportarDados = async (formato) => {
      try {
        mostrarMensagem(`Gerando exportação ${formato.toUpperCase()}...`, 'sucesso');
        const res = await fetchAdmin(`${API_BASE_URL}/api/exportar?formato=${formato}`);
        if (!res.ok) throw new Error('Falha ao gerar exportação');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `exportacao_acougue.${formato === 'xlsx' ? 'xlsx' : 'csv'}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        mostrarMensagem(`✅ Exportação ${formato.toUpperCase()} concluída!`, 'sucesso');
      } catch (err) {
        mostrarMensagem('❌ Erro ao exportar: ' + err.message, 'erro');
      }
    };

    // ── Exportar apenas pedidos do dia corrente em Excel ─────────────────
    // Como funciona:
    //   1. Pega a data de hoje no formato AAAA-MM-DD (ex.: 2026-04-08)
    //   2. Chama a rota /api/exportar-pedidos-dia?data=AAAA-MM-DD
    //   3. O servidor devolve um .xlsx com aba de resumo e aba de itens
    //   4. O navegador baixa o arquivo automaticamente
    // Para exportar outro dia, passe a data como parâmetro: exportarPedidosDia('2026-04-07')
    const exportarPedidosDia = async (dataEspecifica) => {
      try {
        // Se não passar data, usa hoje
        const data = dataEspecifica || new Date().toISOString().slice(0, 10);
        mostrarMensagem(`📅 Gerando relatório de pedidos de ${data}...`, 'sucesso');
        const res = await fetchAdmin(`${API_BASE_URL}/api/exportar-pedidos-dia?data=${data}`);
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || 'Falha ao gerar relatório');
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `pedidos_${data}.xlsx`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        mostrarMensagem(`✅ Relatório de pedidos de ${data} baixado com sucesso!`, 'sucesso');
      } catch (err) {
        mostrarMensagem('❌ Erro ao exportar pedidos do dia: ' + err.message, 'erro');
      }
    };
    // ───────────────────────────────────────────────────────────────────

    const API_BASE_URL = window.APP_CONFIG?.API_BASE_URL || (() => {
      if (window.location.protocol === "file:") {
        return "http://localhost:3000";
      }
      return window.location.origin.replace(/\/+$/, "");
    })();

    let dadosAtual = [];

      const getMensagemErro = (error, fallback) => {
        const message = String(error?.message || "").trim();
        if (message === "Failed to fetch") {
          return `Não foi possível conectar à API em ${API_BASE_URL}. Verifique se o backend publicado está online e se o CORS está liberado para o frontend.`;
        }
        return message || fallback;
      };

    const mostrarMensagem = (texto, tipo = "sucesso") => {
      const el = document.getElementById("mensagem");
      el.textContent = texto;
      el.className = `mensagem ${tipo}`;
      setTimeout(() => {
        el.className = "mensagem";
      }, 4000);
    };

    const formatCurrency = (valor) => {
      return "R$ " + Number(valor).toFixed(2).replace(".", ",");
    };

    const carregarDados = async () => {
      try {
        const response = await fetchAdmin(`${API_BASE_URL}/admin/dashboard-data`);
        if (!response.ok) throw new Error("Erro ao carregar dados");

        const dados = await response.json();
        dadosAtual = dados.produtos;

        // Atualiza resumo
        document.getElementById("total-produtos").textContent = dados.resumo.total_produtos;
        document.getElementById("com-estoque").textContent = dados.resumo.com_estoque;
        document.getElementById("sem-estoque").textContent = dados.resumo.sem_estoque;

        renderizarTabela(dadosAtual);
      } catch (error) {
          mostrarMensagem("Erro ao carregar dados: " + getMensagemErro(error, "Falha ao carregar dados"), "erro");
        document.getElementById("tabela-container").innerHTML = `
          <div style="padding: 40px; text-align: center; color: #dc3545;">
            <p>❌ Erro ao conectar com a API</p>
            <p>Endpoint configurado: ${API_BASE_URL}</p>
          </div>
        `;
      }
    };

    const renderizarTabela = (dados) => {
      if (dados.length === 0) {
        document.getElementById("tabela-container").innerHTML = `
          <div style="padding: 40px; text-align: center; color: #999;">
            <p>Nenhum produto encontrado</p>
          </div>
        `;
        return;
      }

      const html = `
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Produto</th>
              <th>Categoria</th>
              <th>Preço</th>
              <th>Estoque (kg)</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            ${dados.map(p => `
              <tr data-id="${p.id}">
                <td>#${p.id}</td>
                <td>${p.nome}</td>
                <td>${p.categoria}</td>
                <td>
                  <input type="number" class="preco-input" value="${Number(p.preco).toFixed(2)}" 
                    step="0.01" min="0">
                </td>
                <td>
                  <input type="number" class="estoque-input" value="${Number(p.estoque).toFixed(1)}" 
                    step="0.1" min="0">
                </td>
                <td>
                  <span class="status-badge ${p.estoque > 0 ? 'status-disponivel' : 'status-bloqueado'}">
                    ${p.estoque > 0 ? '✓ Disponível' : '✕ Sem Estoque'}
                  </span>
                </td>
                <td>
                  <button class="btn-salvar" onclick="salvarProduto(${p.id})">Salvar</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;

      document.getElementById("tabela-container").innerHTML = html;
    };

    const salvarProduto = async (id) => {
      const row = document.querySelector(`tr[data-id="${id}"]`);
      const novoEstoque = parseFloat(row.querySelector(".estoque-input").value);
      const novoPreco = parseFloat(row.querySelector(".preco-input").value);

      if (isNaN(novoEstoque) || isNaN(novoPreco) || novoPreco <= 0) {
        mostrarMensagem("Valores inválidos!", "erro");
        return;
      }

      try {
        // Atualiza estoque
        const resEstoque = await fetchAdmin(`${API_BASE_URL}/admin/estoque/${id}`, {
          method: "PATCH",
          body: JSON.stringify({ quantidade: novoEstoque })
        });

        // Atualiza preço
        const resPreco = await fetchAdmin(`${API_BASE_URL}/admin/preco/${id}`, {
          method: "PATCH",
          body: JSON.stringify({ preco: novoPreco })
        });

        if (!resEstoque.ok || !resPreco.ok) {
          throw new Error("Erro ao salvar dados");
        }

        mostrarMensagem("✅ Produto atualizado com sucesso!", "sucesso");
        
        // Recarrega dados
        setTimeout(() => carregarDados(), 500);
      } catch (error) {
        mostrarMensagem("❌ Erro ao salvar: " + error.message, "erro");
      }
    };

    const cadastrarProduto = async () => {
      const nome = String(document.getElementById("novo-nome")?.value || "").trim();
      const categoria = String(document.getElementById("novo-categoria")?.value || "").trim().toLowerCase();
      const preco = Number(document.getElementById("novo-preco")?.value || 0);
      const estoque = Number(document.getElementById("novo-estoque")?.value || 0);
      const imagemUrl = String(document.getElementById("novo-imagem-url")?.value || "").trim();

      if (!nome) {
        mostrarMensagem("Informe o nome do produto.", "erro");
        return;
      }

      if (!categoria) {
        mostrarMensagem("Selecione a categoria.", "erro");
        return;
      }

      if (!Number.isFinite(preco) || preco <= 0) {
        mostrarMensagem("Preço inválido. Informe um valor maior que zero.", "erro");
        return;
      }

      if (!Number.isFinite(estoque) || estoque < 0) {
        mostrarMensagem("Estoque inválido. Informe um valor igual ou maior que zero.", "erro");
        return;
      }

      try {
        const resCreate = await fetchAdmin(`${API_BASE_URL}/produtos`, {
          method: "POST",
          body: JSON.stringify({
            nome,
            preco,
            categoria,
            imagem_url: imagemUrl || null,
          })
        });

        const dataCreate = await resCreate.json().catch(() => ({}));

        if (!resCreate.ok || !dataCreate?.id) {
          throw new Error(dataCreate?.error || "Não foi possível criar o produto.");
        }

        const productId = Number(dataCreate.id);

        const resStock = await fetchAdmin(`${API_BASE_URL}/admin/estoque/${productId}`, {
          method: "PATCH",
          body: JSON.stringify({ quantidade: estoque })
        });

        const dataStock = await resStock.json().catch(() => ({}));

        if (!resStock.ok) {
          throw new Error(dataStock?.error || "Produto criado, mas falhou ao salvar estoque.");
        }

        mostrarMensagem(`✅ Produto cadastrado com sucesso! ID #${productId}`, "sucesso");

        document.getElementById("novo-nome").value = "";
        document.getElementById("novo-preco").value = "";
        document.getElementById("novo-estoque").value = "";
        document.getElementById("novo-imagem-url").value = "";
        document.getElementById("novo-categoria").value = "bovino";

        await carregarDados();
      } catch (error) {
        mostrarMensagem("❌ Erro ao cadastrar: " + (error?.message || "Falha"), "erro");
      }
    };

          body: JSON.stringify({ produtos: CATALOGO_PADRAO })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data?.error || "Falha na importação");
